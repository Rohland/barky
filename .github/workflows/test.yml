name: Run Tests

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      TZ: Africa/Johannesburg
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@v6
        name: ⬇️ Install pnpm
        with:
          version: 10
          run_install: true

      - name: Run Tests
        run: pnpm test
