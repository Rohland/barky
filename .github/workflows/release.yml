name: Publish Package
on:
  workflow_dispatch:
    inputs:
      beta:
        description: 'Publish as beta (npm tag: beta)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Africa/Johannesburg
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: ⬇️ Install pnpm
        with:
          run_install: true
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📋 Run Tests
        run: |
          pnpm test

      - name: 👷🏼‍ Build
        run: pnpm run build

      - name: 🚀 Publish
        run: npm publish ${{ inputs.beta == true && '--tag beta' || '' }}
